apiVersion: v1
kind: Namespace
metadata:
  name: observability-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: opentelemetry-node-agent
  namespace: observability-system
  labels:
    app: opentelemetry-node-agent
spec:
  selector:
    matchLabels:
      app: opentelemetry-node-agent
  template:
    metadata:
      labels:
        app: opentelemetry-node-agent
    spec:
      containers:
      - name: opentelemetry-node-agent
        image: opentelemetry-node-agent
        args: ["--path", "/var/log/otel-data.bin"]
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: query-http
        volumeMounts:
        - name: varlog
          mountPath: /var/log
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-node-agent
  namespace: observability-system
spec:
  selector:
    app: opentelemetry-node-agent
  ports:
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: query-http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-server
  namespace: observability-system
  labels:
    app: query-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-server
  template:
    metadata:
      labels:
        app: query-server
    spec:
      containers:
      - name: query-server
        image: opentelemetry-query-server
        ports:
        - containerPort: 8080
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: queryserver
  namespace: observability-system
spec:
  selector:
    app: query-server
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 443
    targetPort: 8080
    name: https
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.custom.metrics.k8s.io
spec:
  service:
    name: queryserver
    namespace: observability-system
  group: custom.metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: custom-metrics-reader
rules:
- apiGroups:
  - custom.metrics.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hpa-custom-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: custom-metrics-reader
subjects:
- kind: ServiceAccount
  name: horizontal-pod-autoscaler
  namespace: kube-system
---
# Test Application
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-app
        image: test-app
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
---
# HPA for Test Application
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: test-app-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: test-app
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Pods
    pods:
      metric:
        name: test_metric
      target:
        type: AverageValue
        averageValue: "50"
