apiVersion: v1
kind: Namespace
metadata:
  name: observability-system
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: observability-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: query-server-cert
  namespace: observability-system
spec:
  secretName: query-server-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
  commonName: queryserver.observability-system.svc
  dnsNames:
  - queryserver.observability-system.svc
  - queryserver.observability-system.svc.cluster.local
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: opentelemetry-node-agent
  namespace: observability-system
  labels:
    app: opentelemetry-node-agent
spec:
  selector:
    matchLabels:
      app: opentelemetry-node-agent
  template:
    metadata:
      labels:
        app: opentelemetry-node-agent
    spec:
      containers:
      - name: opentelemetry-node-agent
        image: opentelemetry-node-agent
        args: ["--path", "/var/log/otel-data"]
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: query-http
        volumeMounts:
        - name: varlog
          mountPath: /var/log
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-node-agent
  namespace: observability-system
spec:
  selector:
    app: opentelemetry-node-agent
  ports:
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: query-http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-server
  namespace: observability-system
  labels:
    app: observability-query-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-query-server
  template:
    metadata:
      labels:
        app: observability-query-server
    spec:
      containers:
      - name: query-server
        image: opentelemetry-query-server
        args:
        - "--tls-cert-file=/certs/tls.crt"
        - "--tls-private-key-file=/certs/tls.key"
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 9443
          name: grpc
        volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: query-server-tls
---
apiVersion: v1
kind: Service
metadata:
  name: queryserver
  namespace: observability-system
spec:
  selector:
    app: observability-query-server
  ports:
  - port: 443
    targetPort: 8443
    name: https
  - port: 9443
    targetPort: 9443
    name: grpc
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.custom.metrics.k8s.io
  annotations:
    cert-manager.io/inject-ca-from: observability-system/query-server-cert
spec:
  service:
    name: queryserver
    namespace: observability-system
    port: 443
  group: custom.metrics.k8s.io
  version: v1beta1
  groupPriorityMinimum: 100
  versionPriority: 100
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: custom-metrics-reader
rules:
- apiGroups:
  - custom.metrics.k8s.io
  resources:
  - "*"
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hpa-custom-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: custom-metrics-reader
subjects:
- kind: ServiceAccount
  name: horizontal-pod-autoscaler
  namespace: kube-system
