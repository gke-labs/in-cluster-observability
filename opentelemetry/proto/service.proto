syntax = "proto3";

package opentelemetry;

option go_package = "github.com/gke-labs/in-cluster-observability/opentelemetry/pkg/pb";

// RegistrationService is used by sinks to register with the query server.
service RegistrationService {
  // Register allows a sink to register itself with the query server.
  // The sink should keep this stream open to maintain the registration.
  // The sink should periodically send RegisterRequest messages (heartbeats).
  rpc Register(stream RegisterRequest) returns (stream RegisterResponse);
}

message RegisterRequest {
  // Address of the sink (host:port).
  string address = 1;
}

message RegisterResponse {
  // For acknowledgment or future commands.
}

// QueryService is hosted on the sink and used by the query server to query it.
service QueryService {
  // Query executes a query on the sink.
  rpc Query(QueryRequest) returns (stream QueryResponse);
}

message QueryRequest {
  string query = 1;
}

message QueryResponse {
  // Elements are OTLP messages (e.g., ExportMetricsServiceRequest) marshaled to binary proto.
  repeated bytes metrics = 1;
  repeated bytes logs = 2;
  repeated bytes traces = 3;
}
